server:
  port: 8080

spring:
  application:
    name: neuhospital

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6380
      timeout: 5s

  kafka:
    bootstrap-servers: localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: smart-medical-java
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy-key-for-local-startup}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

minio:
  endpoint: http://localhost:9005
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket:
    ct-original: medical-ct-original
    ct-processed: medical-ct-processed
    ct-heatmap: medical-ct-heatmap
    report: medical-report
    knowledge-docs: knowledge-docs

python:
  image-ai:
    base-url: http://localhost:8001

app:
  ai:
    chat:
  kafka:
    topic:
      image-analysis-request: medical.image.analysis.request
      image-analysis-result: medical.image.analysis.result
      ai-chat-log: medical.ai.chat.log
      audit-log: medical.audit.log
      notification: medical.notification

auth:
  jwt:
    secret: ${JWT_SECRET}
    issuer: smart-medical
    access-expiration-seconds: 7200
    refresh-expiration-seconds: 604800

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /api/**
      packages-to-scan: com.neusoft.neu23.neuhospital

knife4j:
  enable: true
  setting:
    language: zh_cn
