server:
  port: ${DOCTOR_SERVER_PORT:10022}

spring:
  application:
    name: doctor-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
  datasource:
    url: ${DB_URL:jdbc:postgresql://59.110.116.141:5432/postgres}
    username: ${DB_USERNAME:leon}
    password: ${DB_PASSWORD:YcjQe%dFF2*Ds3z7mysH4w}
    driver-class-name: org.postgresql.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
